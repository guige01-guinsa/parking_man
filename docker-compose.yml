services:
  parking-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apartment-parking-api
    env_file:
      - ./backend/.env.production
    ports:
      - "8011:8011"
    volumes:
      - ./backend/data:/data
      - ./backend/uploads:/uploads
      - ./backend/imports:/imports
    restart: unless-stopped

